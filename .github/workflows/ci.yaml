name: AuditLend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auditlend_test
          POSTGRES_USER: auditlend
          POSTGRES_PASSWORD: auditlend
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U auditlend -d auditlend_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://auditlend:auditlend@localhost:5432/auditlend_test
      ASYNC_DATABASE_URL: postgresql+asyncpg://auditlend:auditlend@localhost:5432/auditlend_test
      AUDITLEND_TEST_DATABASE_URL: postgresql://auditlend:auditlend@localhost:5432/auditlend_test
      AUDITLEND_TEST_ASYNC_DATABASE_URL: postgresql+asyncpg://auditlend:auditlend@localhost:5432/auditlend_test
      AUDITLEND_TEST_REDIS_URL: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/0
      PII_ENCRYPTION_KEY: "02468ace02468ace02468ace02468ace02468ace02468ace02468ace02468ace"
      PAN_HASH_SALT: auditlend-ci-salt
      API_KEYS: test-api-key-for-ci:read-write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
